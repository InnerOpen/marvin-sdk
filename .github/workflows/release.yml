name: Release

on:
  push:
    branches:
      - main
  # `develop` deliberately does NOT auto-release. It used to, which minted a public
  # `-next.N` prerelease and pushed a `chore(release)` commit back on every single push.
  # The packages are established on npm now and local consumers use `npm link`, so that
  # churn bought nothing. Cut a prerelease from develop on demand via this dispatch —
  # .releaserc still carries the develop prerelease config, so it versions correctly.
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    environment: npm-production
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.14'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npx semantic-release
